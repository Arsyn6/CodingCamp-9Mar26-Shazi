<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A client-side productivity dashboard with timer, tasks, and quick links">
  <title>Productivity Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="theme-light">
  <header>
    <h1>To-Do List Life Dashboard</h1>
    <div class="theme-toggle">
      <button class="btn-theme-toggle" aria-label="Toggle theme">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
      </button>
    </div>
  </header>

  <main>
    <section class="greeting-widget" id="greeting-container">
      <!-- Greeting widget will be rendered here -->
    </section>

    <section class="timer-widget" id="timer-container">
      <!-- Timer widget will be rendered here -->
    </section>

    <section class="task-manager" id="task-container">
      <!-- Task manager will be rendered here -->
    </section>

    <section class="quick-links-manager" id="quick-links-container">
      <!-- Quick links manager will be rendered here -->
    </section>

    <section class="logo-widget" id="logo-container">
      <div class="logo-display">
        <svg class="task-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#fff45e;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#fadfff;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#31093d;stop-opacity:1" />
            </linearGradient>
          </defs>
          <rect class="logo-bg" x="10" y="10" width="80" height="80" rx="10" fill="url(#lightGradient)"/>
          <path d="M25 35 L35 45 L55 25" stroke="currentColor" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="25" y1="55" x2="75" y2="55" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <line x1="25" y1="70" x2="75" y2="70" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <h4>Organize, Focus, Make it easy.</h4>
      </div>

    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
